<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RECALL — Playground</title>
  <meta name="description" content="Write RECALL source in your browser. The compiler runs server-side and returns self-contained HTML.">
  <link rel="icon" href="/favicon.ico">
  <style>
@import url('https://fonts.googleapis.com/css2?family=IBM%20Plex%20Mono:wght@400;500;600&family=IBM%20Plex%20Sans:wght@300;400;500;600&display=swap');
:root {
  --bg: #080808;
  --text: #f0f0f0;
  --muted: #e2e2e2;
  --accent: #00ff41;
  --border: #2a2a2a;
  --panel: #0e0e0e;
  --font-mono: 'IBM Plex Mono', 'Courier New', monospace;
  --font-sans: 'IBM Plex Sans', 'Segoe UI', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-mono); background: var(--bg); color: var(--text); line-height: 1.7; font-size: 16px; -webkit-font-smoothing: antialiased; height: 100vh; display: flex; flex-direction: column; }
a { color: var(--accent); text-decoration: none; }
a:hover { opacity: 0.8; }

/* ── Nav ── */
nav { padding: 16px 0; border-bottom: 1px solid var(--border); flex-shrink: 0; background: var(--bg); position: sticky; top: 0; z-index: 100; }
.nav-inner { display: flex; align-items: center; justify-content: space-between; max-width: 100%; padding: 0 24px; }
.nav-logo { font-weight: 600; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; color: var(--text); cursor: pointer; transition: color 0.15s; }
.nav-logo:hover { color: var(--accent); opacity: 1; }
.nav-links { display: flex; gap: 32px; }
.nav-links a { font-size: 13px; letter-spacing: 1px; text-transform: uppercase; color: var(--text); opacity: 0.6; transition: color 0.15s, opacity 0.15s; }
.nav-links a:hover { color: var(--accent); opacity: 1; }
.nav-links a.active { color: var(--accent); opacity: 1; }

/* ── Preset bar ── */
.preset-bar { display: flex; align-items: center; gap: 0; border-bottom: 1px solid var(--border); background: var(--panel); flex-shrink: 0; padding: 0 12px; overflow-x: auto; }
.preset-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); opacity: 0.45; margin-right: 16px; white-space: nowrap; }
.preset-btn { padding: 10px 16px; font-family: var(--font-mono); font-size: 11px; letter-spacing: 1px; text-transform: uppercase; background: none; border: none; border-bottom: 2px solid transparent; margin-bottom: -1px; color: var(--muted); cursor: pointer; transition: color 0.15s; white-space: nowrap; }
.preset-btn:hover { color: var(--text); }
.preset-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ── Syntax token colours (match compiled RECALL code blocks) ── */
.tok-kw    { color: #7ee787; }
.tok-stmt  { color: #00ff41; }
.tok-with  { color: #d2a8ff; }
.tok-str   { color: #f0b060; }
.tok-num   { color: #79b8ff; }
.tok-field { color: #79b8ff; }

/* ── Editor / Preview panes ── */
.workspace { display: grid; grid-template-columns: 1fr 1fr; flex: 1; min-height: 0; }
.editor-pane { display: flex; flex-direction: column; border-right: 1px solid var(--border); min-height: 0; }
.pane-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 16px; border-bottom: 1px solid var(--border); background: var(--panel); flex-shrink: 0; }
.pane-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); opacity: 0.5; }
.pane-label code { font-family: var(--font-mono); font-size: 10px; color: var(--accent); background: rgba(0,255,65,0.07); padding: 2px 7px; border: 1px solid rgba(0,255,65,0.18); letter-spacing: 0; opacity: 1; }
.copy-btn { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.5px; background: none; border: 1px solid var(--border); color: var(--muted); padding: 4px 10px; cursor: pointer; transition: color 0.15s, border-color 0.15s; }
.copy-btn:hover { color: var(--text); border-color: var(--text); }
.copy-btn.copied { color: var(--accent); border-color: var(--accent); }
/* ── Editor overlay: highlight div sits behind transparent textarea ── */
.editor-wrap { position: relative; flex: 1; overflow: hidden; min-height: 0; }
.editor-hl {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  padding: 20px 24px; margin: 0;
  font-family: var(--font-mono); font-size: 13px; line-height: 1.75;
  color: #c9d1d9; background: var(--bg);
  white-space: pre-wrap; word-wrap: break-word;
  overflow: hidden; pointer-events: none; tab-size: 3;
}
#editor {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  width: 100%; height: 100%;
  background: transparent; color: transparent; caret-color: #e0e0e0;
  font-family: var(--font-mono); font-size: 13px; line-height: 1.75;
  padding: 20px 24px; border: none; outline: none; resize: none;
  tab-size: 3; overflow-y: auto; overflow-x: hidden; white-space: pre-wrap;
}
.preview-pane { display: flex; flex-direction: column; min-height: 0; }
#preview { flex: 1; width: 100%; border: none; background: #fff; min-height: 0; }

/* ── Compile bar ── */
.compile-bar { display: flex; align-items: center; gap: 12px; padding: 8px 16px; border-top: 1px solid var(--border); background: var(--panel); flex-shrink: 0; }
.compile-btn { font-family: var(--font-mono); font-size: 12px; letter-spacing: 1px; text-transform: uppercase; background: var(--accent); color: var(--bg); border: none; padding: 8px 20px; cursor: pointer; font-weight: 600; transition: opacity 0.15s; }
.compile-btn:hover { opacity: 0.85; }
.compile-btn:disabled { opacity: 0.4; cursor: default; }
.expand-btn { font-family: var(--font-mono); font-size: 12px; letter-spacing: 1px; text-transform: uppercase; background: none; color: #d2a8ff; border: 1px solid rgba(210,168,255,0.4); padding: 7px 16px; cursor: pointer; font-weight: 500; transition: color 0.15s, border-color 0.15s, opacity 0.15s; }
.expand-btn:hover { color: #e8c8ff; border-color: rgba(210,168,255,0.8); }
.expand-btn:disabled { opacity: 0.4; cursor: default; }
.status { font-size: 12px; color: var(--muted); opacity: 0.6; flex: 1; }
.status.ok  { color: var(--accent); opacity: 1; }
.status.err { color: #f87171; opacity: 1; }

/* ── Diagnostics ── */
.diagnostics { border-top: 1px solid var(--border); background: #100808; flex-shrink: 0; max-height: 160px; overflow-y: auto; display: none; }
.diagnostics.visible { display: block; }
.diag-row { display: flex; gap: 16px; padding: 8px 20px; border-bottom: 1px solid rgba(248,113,113,0.1); font-size: 12px; font-family: var(--font-mono); }
.diag-code { color: #f87171; font-weight: 600; white-space: nowrap; min-width: 60px; }
.diag-msg  { color: var(--muted); }
.diag-why  { color: var(--muted); opacity: 0.6; font-size: 11px; }

@media (max-width: 768px) {
  .workspace { grid-template-columns: 1fr; }
  .editor-pane { border-right: none; border-bottom: 1px solid var(--border); max-height: 40vh; }
  .nav-links { gap: 16px; }
}
  </style>
</head>

// ── Syntax highlighter — ported from recall-compiler syntaxHighlight() ──
function syntaxHighlight(raw) {
  const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
  const lines = raw.split('\n')
  const out   = []
  let heredoc = false

  for (const line of lines) {
    let s = esc(line)

    // ── HEREDOC body ─────────────────────────────────────────────
    if (heredoc) {
      if (/^\s*END HEREDOC\./.test(line)) {
        heredoc = false
        out.push('<span class="tok-kw">' + s + '</span>')
      } else {
        out.push('<span class="tok-str">' + s + '</span>')
      }
      continue
    }
    if (/\bHEREDOC\b/.test(line) && !/END HEREDOC/.test(line)) heredoc = true

    // ── Token passes (same order as compiler) ────────────────────
    // String literals (escaped as &quot; by esc())
    s = s.replace(/(&quot;)((?:[^&]|&(?!quot;))*?)(&quot;)/g,
      '<span class="tok-str">$1$2$3</span>')
    // Division headers
    s = s.replace(/\b(IDENTIFICATION|ENVIRONMENT|DATA|PROCEDURE|COMPONENT) (DIVISION)\b/g,
      '<span class="tok-kw">$1 $2</span>')
    // Section headers
    s = s.replace(/\b(WORKING-STORAGE|ITEMS|PALETTE|FONT|CONFIGURATION|STYLE-BLOCK) (SECTION)\b/g,
      '<span class="tok-kw">$1 $2</span>')
    // STOP RUN / STOP SECTION
    s = s.replace(/\bSTOP (RUN|SECTION)\b/g,
      '<span class="tok-stmt">STOP $1</span>')
    // Display verbs
    s = s.replace(/\b(DISPLAY|COPY|PERFORM|MOVE|COMPUTE)\b/g,
      '<span class="tok-stmt">$1</span>')
    // Clause keywords
    s = s.replace(/\b(WITH|ON-CLICK|USING|FROM|PIC|VALUE)\b/g,
      '<span class="tok-with">$1</span>')
    // Identification / environment field names
    s = s.replace(/\b(PROGRAM-ID|PAGE-TITLE|AUTHOR|DATE-WRITTEN|DESCRIPTION|FAVICON|VIEWPORT|COLOR-MODE|LANGUAGE|FONT-PRIMARY|FONT-SECONDARY|COLOR-BG|COLOR-TEXT|COLOR-ACCENT|COLOR-BORDER|COLOR-MUTED)\b/g,
      '<span class="tok-field">$1</span>')
    // Level numbers at line start
    s = s.replace(/^( *)(01|05|10)(\s)/,
      '$1<span class="tok-num">$2</span>$3')
    // HEREDOC keyword on the opening line
    s = s.replace(/\b(HEREDOC)\b/g, '<span class="tok-kw">$1</span>')

    out.push(s)
  }
  // Trailing newline keeps the overlay height in sync with the textarea
  return out.join('\n') + '\n'
}

// ── State ──────────────────────────────────────────────────────
const editor      = document.getElementById('editor')
const editorHl    = document.getElementById('editor-hl')
const preview     = document.getElementById('preview')
const status      = document.getElementById('status')
const diagnostics = document.getElementById('diagnostics')
const compileBtn  = document.getElementById('compile-btn')
const expandBtn   = document.getElementById('expand-btn')
const copyBtn     = document.getElementById('copy-btn')
let debounceTimer = null
let currentPreset = 'hello'

// ── Highlight update + scroll sync ────────────────────────────
function updateHighlight() {
  editorHl.innerHTML = syntaxHighlight(editor.value)
}
editor.addEventListener('scroll', () => {
  editorHl.scrollTop  = editor.scrollTop
  editorHl.scrollLeft = editor.scrollLeft
})

// ── Compile ────────────────────────────────────────────────────
async function doCompile(source) {
  compileBtn.disabled = true
  setStatus('Compiling…', '')
  clearDiagnostics()

  const t0 = Date.now()
  try {
    const res  = await fetch(API, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ source }),
    })
    const data = await res.json()
    const elapsed = Date.now() - t0

    if (data.html) {
      preview.srcdoc = data.html
      setStatus(`Compiled in ${elapsed}ms`, 'ok')
      if (data.diagnostics && data.diagnostics.length > 0) {
        showDiagnostics(data.diagnostics)  // warnings only
      }
    } else {
      setStatus('Compile error', 'err')
      showDiagnostics(data.diagnostics || [{ code: 'ERR', severity: 'error', message: data.error || 'Unknown error', why: '' }])
    }
  } catch (err) {
    setStatus('Network error', 'err')
    showDiagnostics([{ code: 'NET', severity: 'error', message: 'Could not reach compile API', why: String(err) }])
  } finally {
    compileBtn.disabled = false
  }
}

// ── Expand button visibility ───────────────────────────────────
function updateExpandBtn() {
  expandBtn.style.display = /WITH INTENT\s+"/.test(editor.value) ? '' : 'none'
}

// ── Expand WITH INTENT via Workers AI ─────────────────────────
async function doExpand() {
  expandBtn.disabled = true
  setStatus('Expanding with AI…', '')
  clearDiagnostics()
  try {
    const res  = await fetch(EXPAND_API, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ source: editor.value }),
    })
    const data = await res.json()
    if (data.expanded) {
      editor.value = data.expanded
      updateHighlight()
      updateExpandBtn()
      clearTimeout(debounceTimer)
      doCompile(editor.value)
    } else {
      setStatus('Expand error', 'err')
      showDiagnostics([{ code: 'EXP', severity: 'error', message: data.error || 'Expansion failed', why: '' }])
    }
  } catch (e) {
    setStatus('Network error', 'err')
    showDiagnostics([{ code: 'NET', severity: 'error', message: 'Could not reach expand API', why: String(e) }])
  } finally {
    expandBtn.disabled = false
  }
}

// ── Status helpers ─────────────────────────────────────────────
function setStatus(msg, cls) {
  status.textContent = msg
  status.className   = 'status' + (cls ? ' ' + cls : '')
}

function clearDiagnostics() {
  diagnostics.innerHTML = ''
  diagnostics.classList.remove('visible')
}

function showDiagnostics(items) {
  diagnostics.innerHTML = items.map(d => `
    <div class="diag-row">
      <span class="diag-code">${d.code}</span>
      <span class="diag-msg">${d.message}${d.why ? ` — ${d.why}` : ''}</span>
    </div>`).join('')
  diagnostics.classList.add('visible')
}

// ── Debounce + instant highlight ──────────────────────────────
editor.addEventListener('input', () => {
  updateHighlight()
  updateExpandBtn()
  clearTimeout(debounceTimer)
  debounceTimer = setTimeout(() => doCompile(editor.value), 800)
})

// ── Compile button ─────────────────────────────────────────────
compileBtn.addEventListener('click', () => {
  clearTimeout(debounceTimer)
  doCompile(editor.value)
})

// ── Expand button ──────────────────────────────────────────────
expandBtn.addEventListener('click', () => {
  clearTimeout(debounceTimer)
  doExpand()
})

// ── Copy button ────────────────────────────────────────────────
copyBtn.addEventListener('click', () => {
  navigator.clipboard.writeText(editor.value).then(() => {
    copyBtn.textContent = 'Copied!'
    copyBtn.classList.add('copied')
    setTimeout(() => {
      copyBtn.textContent = 'Copy'
      copyBtn.classList.remove('copied')
    }, 1800)
  })
})

// ── Tab key in editor ──────────────────────────────────────────
editor.addEventListener('keydown', e => {
  if (e.key === 'Tab') {
    e.preventDefault()
    const start = editor.selectionStart
    const end   = editor.selectionEnd
    editor.value = editor.value.slice(0, start) + '   ' + editor.value.slice(end)
    editor.selectionStart = editor.selectionEnd = start + 3
    updateHighlight()
  }
})

// ── Preset buttons ─────────────────────────────────────────────
document.querySelectorAll('.preset-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const key = btn.dataset.preset
    if (key === currentPreset) return
    currentPreset = key
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'))
    btn.classList.add('active')
    editor.value = PRESETS[key]
    updateHighlight()
    updateExpandBtn()
    clearTimeout(debounceTimer)
    doCompile(editor.value)
  })
})

// ── Initial load ───────────────────────────────────────────────
editor.value = PRESETS[currentPreset]
updateHighlight()
updateExpandBtn()
editor.focus()
doCompile(editor.value)
</script>

</body>
</html>
